name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:

jobs:
  # ── Build native addon for each target ──────────────────────────────────────
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            setup: ""
          # macOS Intel
          - os: macos-14
            target: x86_64-apple-darwin
            setup: ""
          # Linux x64 (glibc)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            setup: ""
          # Linux arm64 (glibc) — cross-compiled on x64 runner
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            setup: |
              sudo apt-get update -y
              sudo apt-get install -y gcc-aarch64-linux-gnu
          # Windows x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            setup: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (1.89)
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.89"
          targets: ${{ matrix.target }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: npm install
        run: npm install

      - name: Run setup (cross-compile deps)
        if: matrix.setup != ''
        run: ${{ matrix.setup }}

      - name: Build
        run: npm run build -- --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: "*.node"
          if-no-files-found: error

  # ── Tests on current platform ────────────────────────────────────────────────
  test:
    name: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.89"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npm install
      - run: npm run build
      - name: Install Solana toolchain
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      - name: Build escrow-vault test program
        run: cargo build-sbf --manifest-path test-programs/escrow-vault/Cargo.toml
      - run: npm test
        env:
          SBF_OUT_DIR: ${{ github.workspace }}/test-programs/escrow-vault/target/deploy

  # ── Publish to npm (only on tag push v*) ─────────────────────────────────────
  publish:
    name: publish
    runs-on: ubuntu-latest
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write   # needed for npm provenance

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org/"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: npm install
        run: npm install

      - name: Download all platform binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move binaries into npm sub-packages
        run: npx @napi-rs/cli artifacts

      - name: Publish main package
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish platform sub-packages
        run: |
          for dir in npm/*/; do
            if [ -f "$dir/package.json" ] && ls "$dir"/*.node 1>/dev/null 2>&1; then
              (cd "$dir" && npm publish --access public --provenance)
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
